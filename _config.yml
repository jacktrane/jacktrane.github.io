# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# 网站基本信息
title: 莫青留
subtitle: jacktrane
description: 莫青留的博客
author: Jack wu
language: zh-tw
timezone: Asia/Shanghai 

# URL
## If your site is put in a subdirectory, set url as 'http://yoursite.com/child' and root as '/child/'
url: http://blog.jacktrane.cn
root: /
permalink: :year:month:day/:url.html
permalink_defaults:
  lang: en
abbrlink:
  alg: crc32  # 算法：crc16(default) and crc32
  rep: hex    # 进制：dec(default) and hex

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link: true # Open external links in new tab
filename_case: 0
render_drafts: false      # 显示草稿
post_asset_folder: true  # 资源文件夹 asset
relative_link: false      # 链接的相对性
future: true              # 未来文章
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace:
  
# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 10
  order_by: -date
  
# Category & Tag
default_category: uncategorized
category_map:
  生活: life
  学习: study
  工作: work


tag_map:          #标签别名

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: kael

#RSS订阅
plugin:
- hexo-generator-feed
#Feed Atom
feed: true
type: rss
path: http://feed43.com/1225037838675024.xml
limit: 20

# Deployment
## Docs: https://hexo.io/docs/deployment.html
# 部署
deploy:
  type: git
  repo: git@github.com:jacktrane/jacktrane.github.io.git
  branch: master
  #message: 提交信息


# cloudfrontanalytics: true

# hexo new [文章title]
# hexo g -d 构建并部署
# hexo server -p [端口]